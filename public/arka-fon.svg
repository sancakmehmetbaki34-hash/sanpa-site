<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="150" fill="#06B6D4" opacity="0.1"/>
  <circle cx="1700" cy="900" r="200" fill="#10B981" opacity="0.1"/>
  <circle cx="960" cy="540" r="100" fill="#06B6D4" opacity="0.05"/>
  
  <!-- Pattern lines -->
  <pattern id="pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="100" y2="100" stroke="#06B6D4" stroke-width="1" opacity="0.05"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#pattern)"/>
</svg>
